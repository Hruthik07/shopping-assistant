version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopping_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port NOT exposed to the host – only accessible inside the compose network
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-shopping_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # Port NOT exposed to the host – only accessible inside the compose network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    # Require a password; value comes from .env / environment
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3565:3565"
    environment:
      # Database – PostgreSQL (not SQLite)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shopping_assistant}
      # Redis – include password in the URL
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CACHE_ENABLED=true
      # LLM keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      # App secrets
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - API_KEY=${API_KEY}
      # Environment
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # AWS (optional – used for Secrets Manager / CloudWatch)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_SECRETS_NAME=${AWS_SECRETS_NAME:-}
      - CHROMA_PERSIST_DIR=./chroma_db
    volumes:
      - ./data:/app/data
      - chroma_data:/app/chroma_db
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  log_data:

